<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fortune Joy LLC | Contact</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
    --red:#ff2c2c;
    --shadow:0 18px 50px rgba(0,0,0,.14);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:linear-gradient(180deg,#ffffff 0%,#f6f7fb 100%);
    color:#222;
}

/* NAVBAR */

header{
    position:fixed;
    width:100%;
    top:0;
    z-index:999;
    background:rgba(255,255,255,.75);
    backdrop-filter:blur(16px);
    box-shadow:0 8px 30px rgba(0,0,0,.06);
    border-bottom:1px solid rgba(0,0,0,.05);
}

.navbar{
    max-width:1400px;
    margin:auto;
    padding:15px 40px;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.logo{
    display:flex;
    align-items:center;
    gap:15px;
}

.logo img{
    height:70px;
    width:auto;
    background:white;
    border-radius:50%;
    box-shadow:0 10px 25px rgba(0,0,0,.12);
}

.logo-text{
    display:flex;
    flex-direction:column;
}

.logo-text h3{
    font-family:'Playfair Display',serif;
    color:var(--red);
}

.logo-text span{
    font-size:12px;
    color:#777;
}

.nav-links{
    display:flex;
    gap:35px;
}

.nav-links a{
    text-decoration:none;
    color:#222;
    font-weight:600;
    transition:.3s;
}

.nav-links a:hover{
    color:var(--red);
    transform:translateY(-2px);
}

.phone-btn{
    background:var(--red);
    color:white;
    padding:14px 22px;
    border-radius:999px;
    font-weight:700;
    text-decoration:none;
}

/* CONTACT SECTION */

.contact-page{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:140px 8% 60px;
}

.contact-card{
    background:white;
    border-radius:30px;
    padding:50px;
    width:min(900px,100%);
    box-shadow:var(--shadow);
    text-align:center;
}

.contact-card h1{
    font-family:'Playfair Display',serif;
    font-size:3rem;
    margin-bottom:15px;
}

.contact-card p{
    color:#666;
    margin-bottom:40px;
}

.contact-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:25px;
}

.contact-item{
    padding:30px;
    border-radius:20px;
    background:#fafafa;
}

.contact-item h3{
    color:var(--red);
    margin-bottom:10px;
}

/* MOBILE */

@media(max-width:1000px){
    .nav-links{
        display:none;
    }

    .phone-btn{
        display:none;
    }
}

@media(max-width:600px){
    .contact-card h1{
        font-size:2.2rem;
    }

    .navbar{
        padding:15px 20px;
    }
}
</style>
</head>

<body>

<header>
    <div class="navbar">

        <div class="logo">
            <img src="logo.png" alt="Fortune Joy Logo">
            <div class="logo-text">
                <h3>Fortune Joy LLC</h3>
                <span>Unlock Your Dream Home</span>
            </div>
        </div>

        <div class="nav-links">
            <a href="https://fortunejoyllc.github.io/">Home</a>
            <a href="https://fortunejoyllc.github.io/viewproperties/">Properties</a>
            <a href="#">Management</a>
            <a href="#">Tenants</a>
            <a href="#">Contact</a>
        </div>

        <a href="https://fortunejoyllc.github.io/portal/" class="phone-btn">
            Tenant Portal
        </a>

    </div>
</header>

<section class="contact-page">

    <div class="contact-card">

        <h1>Contact Information</h1>
        <p>Get in touch with Fortune Joy LLC.</p>

        <div class="contact-grid">

            <div class="contact-item">
                <h3>Manager</h3>
                <p>Rajesh Kumar</p>
            </div>

            <div class="contact-item">
                <h3>Phone</h3>
                <p>850-270-8205</p>
            </div>

            <div class="contact-item">
                <h3>Address</h3>
                <p>2800 S Adams St, Tallahassee, FL</p>
            </div>

        </div>

    </div>

</section>

<script>
let logoClicks = 0;
let clickTimer;

document.querySelector(".logo").addEventListener("click", function() {
    logoClicks++;

    clearTimeout(clickTimer);

    clickTimer = setTimeout(() => {
        logoClicks = 0;
    }, 5000);

    if (logoClicks >= 1) {
        window.location.href = "https://fortunejoyllc.github.io/home/";
    }
});
</script>

</body>
</html>
